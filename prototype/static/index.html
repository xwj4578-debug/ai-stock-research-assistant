<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>AlphaLens Research Workspace</title>
    <link rel="manifest" href="/static/manifest.json" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="workspace-shell">
      <header class="workspace-topbar">
        <div class="brand-block">
          <span class="brand-mark">A</span>
          <div>
            <strong>AlphaLens</strong>
            <small>Research Workspace</small>
          </div>
        </div>
        <div class="global-search">
          <label class="sr-only" for="globalStockInput">搜索股票</label>
          <input id="globalStockInput" type="search" placeholder="搜索股票、代码、板块" />
          <button id="globalAnalyzeButton" type="button">研究</button>
        </div>
        <div class="topbar-actions">
          <button class="icon-action" type="button" title="AI">AI</button>
          <button class="icon-action" type="button" title="通知">通知</button>
          <button class="profile-action" type="button">User</button>
        </div>
      </header>

      <aside class="workspace-sidebar" aria-label="主导航">
        <nav>
          <button class="side-nav active" type="button" data-view="workspace">Workspace <kbd>1</kbd></button>
          <button class="side-nav" type="button" data-view="market">Market <kbd>2</kbd></button>
          <button class="side-nav" type="button" data-view="sector">Sector <kbd>3</kbd></button>
          <button class="side-nav" type="button" data-view="stocks">Stocks <kbd>4</kbd></button>
          <button class="side-nav" type="button" data-view="watchlist">Watchlist <kbd>5</kbd></button>
          <button class="side-nav" type="button" data-view="reports">Research Reports <kbd>6</kbd></button>
          <button class="side-nav" type="button" data-view="review">Review <kbd>7</kbd></button>
          <button class="side-nav" type="button" data-view="settings">Settings <kbd>8</kbd></button>
        </nav>
      </aside>

      <main class="workspace-main">
        <section id="status" class="status-card">正在加载 Research Workspace...</section>

        <section id="workspaceView" class="workspace-view"></section>

        <section id="analysisView" class="workspace-view" hidden>
          <section class="search-card">
            <label for="stockInput">股票名称 / 代码</label>
            <textarea id="stockInput" rows="3" placeholder="例如：605500、森林包装、贵州茅台。多只股票可用逗号或换行分隔。"></textarea>
            <div class="actions">
              <button id="analyzeButton" type="button">分析股票</button>
              <button id="compareButton" class="ghost-button" type="button">多股对比</button>
            </div>
          </section>
          <section id="singleResult" class="result-stack"></section>
          <section id="compareResult" class="result-stack"></section>
        </section>
      </main>

      <aside class="ai-copilot" id="aiCopilot">
        <button id="toggleCopilot" class="copilot-toggle" type="button">AI Copilot</button>
        <div class="copilot-body">
          <strong>下一步</strong>
          <p id="copilotText">加载完成后，我会给出今日研究顺序。</p>
        </div>
      </aside>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
